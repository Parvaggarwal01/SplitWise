name: Deploy Go API to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/azure-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build backend
        working-directory: api
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o server ./cmd/server
          printf '#!/bin/sh\nchmod +x ./server\n./server\n' > startup.sh
          chmod +x startup.sh
          zip app.zip server startup.sh

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: splitwise
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: api/app.zip
